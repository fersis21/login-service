spring.application.name=Login Service
server.servlet.context-path=/kaiser/login/v1.0
server.port=8080
application-description=@project.description@
application-version=@project.version@
#para que muestre el mensaje en caso de error
server.error.include-message=always
fie-enable-default-message=${FIE_ENABLE_DEFAULT_MESSAGE:true}
fie-httpstatus500.out-message=${FIE_HTTPSTATUS500_OUTMESSAGE:El servicio solicitado no se encuentra disponible, por favor intente mas tarde}
fie-httpstatus400.out-message=${FIE_HTTPSTATUS400_OUTMESSAGE:La informaci\u00f3n introducida no ha retornado ningun resultado, por favor intente nuevamente}
fie-httpstatus410.out-message=${FIE_HTTPSTATUS410_OUTMESSAGE:Esta sesi\u00f3n ya no es v\u00e1lida, por favor ingrese nuevamente}
fie-httpstatusAll.out-message=${FIE_HTTPSTATUSALL_OUTMESSAGE:El servicio solicitado no se encuentra disponible, disculpe las molestias, por favor intente mas tarde}
fie-custom.service.code=${FIE_CUSTOM_SERVICE_CODE:000}

# JWT Configuration
jwt.secret=7nB+K6e8Xy9wM4VzQ3bJ1rT5gK9mP2xF4vC7sD0zN8xL1kR3jH5fG6aQ0wE2rT4y
jwt.expiration=86400000

# BCrypt strength (4-31, default 10)
spring.security.bcrypt.strength=10

# Disable spring.security  warning
#spring.security.user.password=
#spring.security.user.name=

# Disable open-in-view warning
spring.jpa.open-in-view=false

# Logging level para debug
logging.level.com.kaiser.login.service.security=DEBUG
logging.level.org.springframework.security=DEBUG